<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfinityStore</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- Animated Background -->
<div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- Header -->
<header>

<div class="logo">

<i class="fa-solid fa-infinity"></i>

<h2>InfinityStore</h2>

</div>

<div class="header-icons">

<i class="fa-solid fa-bell"></i>

<i class="fa-solid fa-user"></i>

</div>

</header>

<!-- Hero Banner -->

<section class="hero">

<div class="overlay"></div>

<div class="hero-content">

<h1>Discover Amazing Apps</h1>

<p>Download Premium Games & Apps from Infinity Spot.</p>

<button class="exploreBtn">

Explore Now

</button>

</div>

</section>

<!-- Search -->

<section class="searchBox">

<div class="search">
    <div class="card">
    <h3>Infinity Runner</h3>
    <p>Endless Running Game</p>
</div>

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
placeholder="Search Apps & Games...">

</div>

</section>

<!-- Categories -->

<section class="categories">

<button class="active">
All
</button>

<button>
Games
</button>

<button>
Apps
</button>

<button>
Tools
</button>

<button>
Entertainment
</button>

</section>

<!-- Featured -->

<section class="section-title">

<h2>Featured</h2>

<a href="#">See All</a>

</section>

<section class="featured">

<div class="feature-card">

<div class="feature-image">

<img src="infinity.jpg">

</div>

<div class="feature-info">

<h3>Fire Basil</h3>

<p>Infinity Spot</p>

<button>

Download

</button>

</div>

</div>

</section>

<!-- Trending -->

<section class="section-title">

<h2>Trending</h2>

<a href="#">More</a>

</section>

<section class="cards">

<div class="card">

<img src="infinity.jpg">

<h3>Fire Basil</h3>

<p>Action Game</p>

<button>Download</button>

</div>

<div class="card">

<img src="assets/icon2.png">

<h3>Infinity Player</h3>

<p>Video Player</p>

<button>Download</button>

</div>

<div class="card">

<img src="assets/icon3.png">

<h3>Music Box</h3>

<p>Music</p>

<button>Download</button>

</div>

</section>
<!-- Bottom Navigation -->

<nav class="bottom-nav">

<a class="active">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

<a>

<i class="fa-solid fa-gamepad"></i>

<span>Games</span>

</a>

<a>

<i class="fa-solid fa-mobile-screen"></i>

<span>Apps</span>

</a>

<a>

<i class="fa-solid fa-download"></i>

<span>Downloads</span>

</a>

<a>

<i class="fa-solid fa-user"></i>

<span>Profile</span>

</a>

</nav>

<script src="app.js"></script>

</body>
</html>
